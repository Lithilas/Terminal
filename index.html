<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airsoft: Dominavimas</title>
    <style>
        :root { --melyna: #1e3a8a; --raudona: #991b1b; --bg: #111827; --text: #f3f4f6; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); text-align: center; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #1f2937; padding: 15px; font-size: 24px; font-weight: bold; border-bottom: 2px solid #374151; }
        #timer { font-size: 48px; font-weight: bold; color: #fbbf24; margin-top: 10px; }
        .scores { display: flex; justify-content: space-around; padding: 20px 0; font-size: 24px; font-weight: bold; }
        .score-melyna { color: #60a5fa; }
        .score-raudona { color: #f87171; }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .active-points-container { font-size: 28px; margin-bottom: 40px; }
        #nfc-status { font-size: 18px; color: #9ca3af; margin-bottom: 20px; }
        .nfc-button { background-color: #10b981; color: white; border: none; padding: 20px 40px; font-size: 24px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); margin-top:20px;}
        .nfc-button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        LIKO LAIKO
        <div id="timer">01:45:00</div>
    </header>

    <div class="scores">
        <div class="score-melyna">MĖLYNA: <span id="score-melyna">0</span></div>
        <div class="score-raudona">RAUDONA: <span id="score-raudona">0</span></div>
    </div>

    <div class="main-content">
        <div id="points-display" class="active-points-container">
            <p style="font-size: 18px; color: #9ca3af;">(Testavimo režimas - ekranas atsinaujins paleidus žaidimą)</p>
        </div>

        <div id="nfc-status">NFC paruoštas. Paspauskite mygtuką ir priglauskite tagą.</div>
        <button id="start-nfc-btn" class="nfc-button">AKTYVUOTI NFC SKAITYTUVĄ</button>
    </div>

    <!-- Prijungiame Firebase kaip modulį -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        // Pridėjome 'get', 'update' ir 'increment' duomenų įrašymui!
        import { getDatabase, ref, onValue, get, update, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlcqAwCrld_zxK-X_7ETMq5iGJ2eR7S5Y",
            authDomain: "terminal-f2a5e.firebaseapp.com",
            databaseURL: "https://terminal-f2a5e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "terminal-f2a5e",
            storageBucket: "terminal-f2a5e.firebasestorage.app",
            messagingSenderId: "532522919385",
            appId: "1:532522919385:web:83308e3689a0cf8cba25c8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Vėliau padarysime pasirinkimo langą, bet dabar testuojame kaip MĖLYNA komanda
        let currentTeam = "MELYNA"; 
        const totalGameTimeMs = 105 * 60 * 1000;
        let timerInterval;

        // --- 1. TAŠKŲ ATNAUJINIMAS ---
        const teamsRef = ref(db, 'teams');
        onValue(teamsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('score-melyna').innerText = data.MELYNA.score;
                document.getElementById('score-raudona').innerText = data.RAUDONA.score;
            }
        });

        // --- 2. LAIKMAČIO ATNAUJINIMAS ---
        const gameStateRef = ref(db, 'game_state');
        onValue(gameStateRef, (snapshot) => {
            const state = snapshot.val();
            if(!state) return;

            clearInterval(timerInterval);

            if (state.status === "stopped") {
                document.getElementById('timer').innerText = "01:45:00";
            } 
            else if (state.status === "running") {
                timerInterval = setInterval(() => {
                    let elapsedTime = Date.now() - (state.start_time + state.total_paused_ms);
                    let timeLeft = totalGameTimeMs - elapsedTime;
                    
                    if(timeLeft <= 0) {
                        timeLeft = 0;
                        clearInterval(timerInterval);
                    }
                    updateTimerDisplay(timeLeft);
                }, 1000);
            }
            else if (state.status === "paused") {
                let elapsedTime = state.pause_time - (state.start_time + state.total_paused_ms);
                let timeLeft = totalGameTimeMs - elapsedTime;
                updateTimerDisplay(timeLeft);
            }
        });

        function updateTimerDisplay(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;
            
            hours = String(hours).padStart(2, '0');
            minutes = String(minutes).padStart(2, '0');
            seconds = String(seconds).padStart(2, '0');
            
            document.getElementById('timer').innerText = `${hours}:${minutes}:${seconds}`;
        }

        // --- 3. NFC NUSKAITYMO LOGIKA ---
        let nfcScannerActive = false;

        document.getElementById('start-nfc-btn').addEventListener('click', async () => {
            if ("NDEFReader" in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    nfcScannerActive = true;
                    
                    document.getElementById('nfc-status').innerText = "NFC SKAITYTUVAS AKTYVUS. Priglauskite tagą.";
                    document.getElementById('nfc-status').style.color = "#10b981";
                    document.getElementById('start-nfc-btn').style.display = "none";

                    ndef.addEventListener("reading", ({ serialNumber }) => {
                        // Svarbu: NFC serijiniai numeriai gali būti skirtingo formato (pvz. 04:A1:B2... arba be dvitaškių)
                        const cleanUid = serialNumber.toLowerCase();
                        handleNfcScan(cleanUid);
                    });
                } catch (error) {
                    document.getElementById('nfc-status').innerText = "Klaida: " + error.message;
                    document.getElementById('nfc-status').style.color = "#ef4444";
                }
            } else {
                document.getElementById('nfc-status').innerText = "NFC nepalaikomas! Naudokite Android Chrome.";
                document.getElementById('nfc-status').style.color = "#ef4444";
            }
        });

        async function handleNfcScan(nfcUid) {
            try {
                // 1. Patikriname duomenų bazėje, kokiam taškui priskirtas šis NFC
                const mappingSnapshot = await get(ref(db, 'nfc_mapping'));
                const mapping = mappingSnapshot.val();
                
                let foundPointId = null;

                // Ieškome atitikmens
                for (const [pointId, mappedUid] of Object.entries(mapping)) {
                    if (mappedUid.toLowerCase() === nfcUid) {
                        foundPointId = pointId;
                        break;
                    }
                }

                if (!foundPointId) {
                    alert(`NFC tagas atpažintas (${nfcUid}), bet jis nepriskirtas jokiam taškui duomenų bazėje!`);
                    return;
                }

                // 2. Jei rado tašką – TESTUOJAME!
                alert(`Nuskenuotas ${foundPointId.toUpperCase()}! Pridedame 10 taškų.`);
                
                // 3. Įrašome taškus į Firebase komandai
                const updates = {};
                updates[`teams/${currentTeam}/score`] = increment(10);
                
                await update(ref(db), updates);

            } catch (error) {
                alert("Klaida susisiekiant su duomenų baze: " + error.message);
            }
        }
    </script>
</body>
</html>
